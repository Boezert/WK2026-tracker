name: WK Data Bijwerken

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Data ophalen en verwerken
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install requests --quiet
          python3 process_wk_data.py

      - name: Opslaan in repo
        run: |
          git config user.name  'WK Data Bot'
          git config user.email 'bot@github.com'
          git add data.json
          git diff --staged --quiet || git commit -m "WK data: $(date -u '+%d %b %Y %H:%M UTC')"
          git push
