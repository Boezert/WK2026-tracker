name: WK Data Bijwerken

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Standen ophalen
        run: |
          curl -s -H "X-Auth-Token: ${{ secrets.FOOTBALL_API_KEY }}" \
            "https://api.football-data.org/v4/competitions/WC/standings?season=2026" \
            -o /tmp/standings.json
          echo "Standen opgehaald:"
          python3 -c "import json; d=json.load(open('/tmp/standings.json')); print(f'  {len(d.get(\"standings\",[]))} standingen')"

      - name: Wedstrijden ophalen (alle, geen stage-filter)
        run: |
          curl -s -H "X-Auth-Token: ${{ secrets.FOOTBALL_API_KEY }}" \
            "https://api.football-data.org/v4/competitions/WC/matches?season=2026" \
            -o /tmp/matches.json
          echo "Wedstrijden opgehaald:"
          python3 -c "
          import json
          d = json.load(open('/tmp/matches.json'))
          matches = d.get('matches', [])
          print(f'  Totaal: {len(matches)} wedstrijden')
          finished = [m for m in matches if m['status'] == 'FINISHED']
          print(f'  Gespeeld: {len(finished)}')
          groups = set(m.get('group','?') for m in matches if m.get('group'))
          print(f'  Groepen: {sorted(groups)}')
          "

      - name: Verhaallijnen genereren + data samenvoegen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install requests --quiet
          python3 - << 'EOF'
import json, sys, requests, os
from datetime import datetime, timezone

with open('/tmp/standings.json') as f:
    standen = json.load(f)
with open('/tmp/matches.json') as f:
    wedstrijden = json.load(f)

if 'error' in standen or 'standings' not in standen:
    print('API-fout standen:', standen, file=sys.stderr)
    sys.exit(1)

# Filter alleen groepsfase wedstrijden
alle_matches = wedstrijden.get('matches', [])
groepsfase = [m for m in alle_matches if m.get('stage') == 'GROUP_STAGE' or m.get('group')]
print(f'Groepsfase wedstrijden: {len(groepsfase)} (van {len(alle_matches)} totaal)')

# Gespeeld per groep
from collections import Counter
per_groep = Counter(m.get('group','?') for m in groepsfase if m['status'] == 'FINISHED')
print('Gespeeld per groep:', dict(sorted(per_groep.items())))

wedstrijden_gefilterd = dict(wedstrijden)
wedstrijden_gefilterd['matches'] = groepsfase

# Samenvatting voor Claude
groepen = [g for g in standen.get('standings', []) if g.get('type') == 'TOTAL' and g.get('group')]
team_data = []
for g in groepen:
    letter = g.get('group', '').replace('GROUP_', '')
    for t in g.get('table', []):
        team_data.append({
            'groep': letter, 'team': t['team']['name'],
            'pts': t['points'], 'pos': t['position'],
            'w': t['won'], 'g': t['draw'], 'v': t['lost'],
            'gf': t['goalsFor'], 'gt': t['goalsAgainst'],
            'ds': t['goalDifference'], 'gespeeld': t['playedGames']
        })

recente = [m for m in groepsfase if m['status'] == 'FINISHED'][-12:]
uitslag_samenvatting = [
    {'thuis': m['homeTeam']['name'], 'uit': m['awayTeam']['name'],
     'score': f"{m['score']['fullTime']['home']}-{m['score']['fullTime']['away']}"}
    for m in recente
]

# Verhaallijnen via Claude
verhaallijnen = []
api_key = os.environ.get('ANTHROPIC_API_KEY', '')
if api_key and team_data:
    prompt = f"""Je bent een WK-verslaggever. Genereer precies 6 pakkende verhaallijnen over de FIFA WK 2026 groepsfase in het Nederlands.
Retourneer ALLEEN een geldig JSON-array. Elk object: {{"head": "koptekst max 5 woorden", "body": "2-3 zinnen met concrete stats"}}.

Standen: {json.dumps(team_data, ensure_ascii=False)}
Recente uitslagen: {json.dumps(uitslag_samenvatting, ensure_ascii=False)}"""
    try:
        resp = requests.post('https://api.anthropic.com/v1/messages',
            headers={'x-api-key': api_key, 'anthropic-version': '2023-06-01', 'content-type': 'application/json'},
            json={'model': 'claude-haiku-4-5-20251001', 'max_tokens': 1500,
                  'messages': [{'role': 'user', 'content': prompt}]}, timeout=30)
        if resp.status_code == 200:
            tekst = resp.json()['content'][0]['text'].strip()
            start, eind = tekst.find('['), tekst.rfind(']') + 1
            if start >= 0 and eind > start:
                verhaallijnen = json.loads(tekst[start:eind])
                print(f'✓ {len(verhaallijnen)} verhaallijnen gegenereerd')
    except Exception as e:
        print(f'Verhaallijnen overgeslagen: {e}', file=sys.stderr)

data = {
    'bijgewerkt': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
    'standen': standen,
    'wedstrijden': wedstrijden_gefilterd,
    'verhaallijnen': verhaallijnen
}

with open('data.json', 'w', encoding='utf-8') as f:
    json.dump(data, f, ensure_ascii=False)
print('✓ data.json opgeslagen')
EOF

      - name: Opslaan in repo
        run: |
          git config user.name  'WK Data Bot'
          git config user.email 'bot@github.com'
          git add data.json
          git diff --staged --quiet || git commit -m "WK data: $(date -u '+%d %b %Y %H:%M UTC')"
          git push
