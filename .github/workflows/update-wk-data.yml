name: WK Data Bijwerken

on:
  schedule:
    - cron: '*/30 * * * *'   # Elke 30 minuten automatisch
  workflow_dispatch:           # Of handmatig starten

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Standen ophalen
        run: |
          curl -s -H "X-Auth-Token: ${{ secrets.FOOTBALL_API_KEY }}" \
            "https://api.football-data.org/v4/competitions/WC/standings?season=2026" \
            -o /tmp/standings.json

      - name: Wedstrijden ophalen
        run: |
          curl -s -H "X-Auth-Token: ${{ secrets.FOOTBALL_API_KEY }}" \
            "https://api.football-data.org/v4/competitions/WC/matches?season=2026&stage=GROUP_STAGE" \
            -o /tmp/matches.json

      - name: Samenvoegen in data.json
        run: |
          python3 - << 'EOF'
          import json, sys
          from datetime import datetime, timezone

          with open('/tmp/standings.json') as f:
              standen = json.load(f)
          with open('/tmp/matches.json') as f:
              wedstrijden = json.load(f)

          if 'error' in standen or 'message' in standen:
              print('API-fout standen:', standen, file=sys.stderr)
              sys.exit(1)

          data = {
              'bijgewerkt': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'standen': standen,
              'wedstrijden': wedstrijden
          }

          with open('data.json', 'w') as f:
              json.dump(data, f)
          print('data.json aangemaakt ✓')
          EOF

      - name: Opslaan in repo
        run: |
          git config user.name  'WK Data Bot'
          git config user.email 'bot@github.com'
          git add data.json
          git diff --staged --quiet || git commit -m "WK data: $(date -u '+%d %b %Y %H:%M UTC')"
          git push
